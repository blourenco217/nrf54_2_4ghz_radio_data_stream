CONFIG_NCS_SAMPLES_DEFAULTS=y

# Disable BLE stack - we're using raw radio instead
CONFIG_BT=n

CONFIG_CONSOLE=y
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_HANDLER=y
CONFIG_CONSOLE_GETCHAR=y

# UART optimization
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y

# GPIO for potential LED control
CONFIG_GPIO=y

# High-frequency clock configuration (required for radio)
CONFIG_CLOCK_CONTROL=y
CONFIG_CLOCK_CONTROL_NRF=y

# Higher stack size for radio operation
CONFIG_MAIN_STACK_SIZE=2048