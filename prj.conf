CONFIG_NCS_SAMPLES_DEFAULTS=y

CONFIG_BT_DEVICE_NAME="Ball_PD"
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_MAX_CONN=3
CONFIG_BT_CTLR_SDC_PERIPHERAL_COUNT=1

CONFIG_BT_GATT_CLIENT=y

CONFIG_CONSOLE=y
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_HANDLER=y
CONFIG_CONSOLE_GETCHAR=y

CONFIG_BT_CTLR_SDC_CONN_ANCHOR_POINT_REPORT=y
CONFIG_BT_HCI_VS_EVT_USER=y

# UART optimization for high-speed data transmission
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_SERIAL=y
CONFIG_UART_LINE_CTRL=y

# Note: UART baud rate is set in device tree overlay, not Kconfig

# Increase MTU for larger data packets (>247 bytes as recommended)
CONFIG_BT_L2CAP_TX_MTU=251
CONFIG_BT_BUF_ACL_TX_SIZE=255
CONFIG_BT_BUF_ACL_RX_SIZE=255
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251

# Enable 2M PHY for higher data rates
CONFIG_BT_USER_PHY_UPDATE=y
CONFIG_BT_CTLR_PHY_2M=y

# Maximize buffer counts for high throughput
CONFIG_BT_BUF_ACL_TX_COUNT=30
CONFIG_BT_BUF_EVT_RX_COUNT=40
CONFIG_BT_L2CAP_TX_BUF_COUNT=30
CONFIG_BT_ATT_PREPARE_COUNT=10
CONFIG_BT_CONN_TX_MAX=30

# Enable GATT dynamic database (for notifications)
CONFIG_BT_GATT_DYNAMIC_DB=y

# GPIO and peripherals for timed LED toggle (GPIOTE selected automatically)
CONFIG_GPIO=y
CONFIG_NRFX_GPPI=y

# GRTC for high-precision timing on nRF54 series
CONFIG_NRFX_GRTC=y